name: Publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLISH_DIR: dist
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save --no-audit --cache "$RUNNER_TEMP/npm-cache" bower@1.8.14

      - name: Install browser libraries
        run: ./node_modules/.bin/bower install --allow-root --config.interactive=false

      - name: Build
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp -R src/assets dist/assets
          cp src/css/main.css dist/main.min.css
          : > dist/main.min.js
          for file in \
            src/bower_components/phaser-official/build/phaser.min.js \
            src/js/boot.js \
            src/js/preloader.js \
            src/js/menu.js \
            src/js/class/spriter.js \
            src/js/class/actor.js \
            src/js/class/mob.js \
            src/js/class/shoot.js \
            src/js/class/enemy.js \
            src/js/class/flying_mobs.js \
            src/js/class/turret.js \
            src/js/class/player.js \
            src/js/class/bullet.js \
            src/js/class/collectible.js \
            src/js/class/cloud.js \
            src/js/game.js \
            src/js/main.js
          do
            cat "$file" >> dist/main.min.js
            printf '\n' >> dist/main.min.js
          done
          cp src/index.html dist/index.html
          perl -0pi -e 's#<!-- build:css main\.min\.css -->.*?<!-- /build -->#<link rel="stylesheet" href="main.min.css">#s; s#<!-- build:remove -->.*?<!-- /build -->##s; s#<!-- build:js main\.min\.js -->.*?<!-- /build -->#<script src="main.min.js"></script>#s' dist/index.html

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "$PUBLISH_DIR/index.html"
          site="$(mktemp -d)"
          rsync -a --delete "$PUBLISH_DIR"/ "$site"/
          find "$site" -name '.DS_Store' -delete
          touch "$site/.nojekyll"

          cd "$site"
          git init -q
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish pages ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules src/bower_components dist "$RUNNER_TEMP/npm-cache"
